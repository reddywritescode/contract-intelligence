version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: contract-intel-backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
    container_name: contract-intel-frontend
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

  postgres:
    image: pgvector/pgvector:pg16
    container_name: contract-intel-postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: contracts
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
